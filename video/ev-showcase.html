<!DOCTYPE html>
<!-- ev-showcase.html - AutoElite Video: Electric Vehicle Showcase -->
<!-- This is an animated HTML5 placeholder for the Electric Vehicle Showcase video content -->
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0f0f1a; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:serif; }
    .scene { width:640px; height:360px; background:linear-gradient(135deg,#0f0f1a,#1a1a2e); border:2px solid #2ecc71; border-radius:12px; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .glow { position:absolute; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle, #2ecc7122, transparent); animation:pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.3);opacity:1} }
    .car-icon { font-size:80px; animation:drive 4s ease-in-out infinite; position:relative;z-index:1; }
    @keyframes drive { 0%,100%{transform:translateX(-30px)} 50%{transform:translateX(30px)} }
    .title { color:#2ecc71; font-size:22px; font-weight:bold; margin-top:20px; position:relative;z-index:1; }
    .sub { color:#a0a0b0; font-size:13px; margin-top:8px; position:relative;z-index:1; }
    .bar { position:absolute; bottom:20px; left:20px; right:20px; height:4px; background:#333; border-radius:2px; }
    .progress { height:100%; width:0%; background:#2ecc71; border-radius:2px; animation:load 6s linear infinite; }
    @keyframes load { 0%{width:0%} 100%{width:100%} }
    .logo { position:absolute; top:15px; left:20px; color:#2ecc71; font-size:14px; font-weight:bold; z-index:1; }
    .duration { position:absolute; top:15px; right:20px; color:#666; font-size:12px; }
  </style>
</head>
<body>
  <div class="scene">
    <div class="logo">AutoElite</div>
    <div class="duration">2:30</div>
    <div class="glow"></div>
    <div class="car-icon">⚡</div>
    <div class="title">Electric Vehicle Showcase</div>
    <div class="sub">Discover the future of driving with our EV lineup</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</body>
</html>
