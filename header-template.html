<!DOCTYPE html>
<!--
  header-template.html
  This file shows the shared header/nav template used across AutoElite.
  Each HTML page includes this structure manually (no server-side includes).
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO Meta Tags -->
  <meta name="description" content="AutoElite - Premium Car Catalogue. Browse 20+ luxury and performance vehicles with detailed specs, options and pricing.">
  <meta name="keywords" content="cars, auto, catalogue, luxury cars, SUV, electric vehicles, sports cars, BMW, Mercedes, Tesla">
  <meta name="author" content="AutoElite">
  <meta property="og:title" content="AutoElite Car Catalogue">
  <meta property="og:description" content="Browse our premium selection of 20+ vehicles.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Theme Stylesheet (default: theme1) -->
  <link rel="stylesheet" href="css/styles.css">
  <link id="theme-link" rel="stylesheet" href="css/theme1.css">
  <title>AutoElite</title>
</head>
<body>
  <!-- ===== SHARED HEADER / NAV ===== -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">Auto<span>Elite</span></a>
      <nav>
        <ul id="main-nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="catalogue.html">Catalogue</a></li>
          <li><a href="quote.html">Get a Quote</a></li>
          <li><a href="compare.html">Compare</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="wiki/index.html">Help</a></li>
        </ul>
      </nav>
      <!-- Theme Switcher -->
      <div class="theme-switcher" aria-label="Change Theme">
        <button class="theme-btn t1" data-theme="1" title="Gold Theme" aria-label="Apply Gold Theme"></button>
        <button class="theme-btn t2" data-theme="2" title="Green Theme" aria-label="Apply Green Theme"></button>
        <button class="theme-btn t3" data-theme="3" title="Red Theme" aria-label="Apply Red Theme"></button>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Toggle Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>
  <!-- END SHARED HEADER -->
</body>
</html>
