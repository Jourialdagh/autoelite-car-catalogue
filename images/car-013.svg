<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <rect width="400" height="240" fill="#0f0f1a"/>
  <rect x="20" y="20" width="360" height="200" rx="10" fill="#27ae60" opacity="0.15"/>
  <!-- Car body shape -->
  <rect x="60" y="130" width="280" height="50" rx="8" fill="#27ae60"/>
  <rect x="100" y="95" width="200" height="50" rx="10" fill="#27ae60" opacity="0.85"/>
  <!-- Windows -->
  <rect x="115" y="100" width="75" height="38" rx="5" fill="#1a2a3a" opacity="0.8"/>
  <rect x="200" y="100" width="75" height="38" rx="5" fill="#1a2a3a" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="120" cy="180" r="28" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
  <circle cx="120" cy="180" r="16" fill="#333" stroke="#27ae60" stroke-width="3"/>
  <circle cx="280" cy="180" r="28" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
  <circle cx="280" cy="180" r="16" fill="#333" stroke="#27ae60" stroke-width="3"/>
  <!-- Headlights -->
  <rect x="330" y="140" width="20" height="10" rx="3" fill="#fffde0" opacity="0.9"/>
  <rect x="50" y="140" width="20" height="10" rx="3" fill="#ff4444" opacity="0.7"/>
  <!-- Label -->
  <text x="200" y="230" text-anchor="middle" fill="#27ae60" font-family="serif" font-size="13" font-weight="bold">Subaru Outback</text>
</svg>